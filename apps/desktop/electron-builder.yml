appId: com.mindforge.novelstudio
productName: 心御AI小说辅助器
copyright: Copyright 2026

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - node_modules/**/*

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 心御AI小说辅助器

mac:
  target: dmg
  icon: build/icon.icns

linux:
  target: [AppImage, deb]
  icon: build/icon.png

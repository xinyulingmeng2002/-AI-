appId: com.mindforge.novelstudio
productName: 心御AI小说辅助器
copyright: Copyright 2026

directories:
  output: release

files:
  - dist/**/*
  - node_modules/**/*
  - "!node_modules/**/*.{mk,a,o}"

asar: true

npmRebuild: false

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 心御AI小说辅助器
